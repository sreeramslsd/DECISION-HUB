services:
  db:
    image: postgres:16.14-alpine
    container_name: decisionhub-db
    environment:
      POSTGRES_DB: decisionhub
      POSTGRES_USER: decisionhub_app
      POSTGRES_PASSWORD: dh_dev_sec_pwd_2026
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - decisionhub-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisionhub_app -d decisionhub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decisionhub-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/decisionhub
      SPRING_DATASOURCE_USERNAME: decisionhub_app
      SPRING_DATASOURCE_PASSWORD: dh_dev_sec_pwd_2026
    depends_on:
      db:
        condition: service_healthy
    networks:
      - decisionhub-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  decisionhub-network:
    driver: bridge
