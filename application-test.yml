spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/decisionhub_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  
  flyway:
    enabled: false
    locations: classpath:db/migration/postgresql

  ai:
    vertex:
      gemini:
        enabled: false # Suppress Vertex API calls during testing

security:
  jwt:
    secret: dGVzdF9zZWNyZXRfd2l0aF9zdWZmaWNpZW50X2xlbmd0aF9mb3JfYWxnb3JpdGhtX2hsYWMyNTZfdGVzdF9rZXk=
    expiration-ms: 60000
    refresh-expiration-ms: 600000

logging:
  level:
    root: WARN
    com.decisionhub: DEBUG
